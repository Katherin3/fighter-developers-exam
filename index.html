<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/styles/css/styles.css">
    <title>Fighter Developers Exam</title>
</head>

<body>
    <div class="layout">
        <!-- pavle's sections -->
        <!-- In the aside tag, there is a navigation section where a list is used. -->
        <aside class="aside">
            <!-- a navigation section where a list is used. -->
            <nav class="aside__nav">
                <!--In lists, a div container is used to contain icons and a span for navigation labels. -->
                <ul class="aside__nav__list">
                    <li>
                        <a href="#">
                            <figure>
                                <img src="./assets/images/icon-images/library.png" alt="library icon">
                                <figcaption>My Library</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <figure>
                                <img src="./assets/images/icon-images/Pins.png" alt="pin icon">
                                <figcaption>Pins</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <figure>
                                <img src="./assets/images/icon-images/Playlists.png" alt="Playlists icon">
                                <figcaption>Playlists</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <figure>
                                <img src="./assets/images/icon-images/likes.png" alt="like icon">
                                <figcaption>Liked songs</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <figure>
                                <img src="./assets/images/icon-images/Saves.png" alt="saves icon">
                                <figcaption>Saves</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <figure>
                                <img src="./assets/images/icon-images/Albums.png" alt="albums icon">
                                <figcaption>Albums</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <figure>
                                <img src="./assets/images/icon-images/Folders.png" alt="folders icon">
                                <figcaption>Folders</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <figure>
                                <img src="./assets/images/icon-images/Podcasts.png" alt="podcasts icon">
                                <figcaption>Podcasts</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <figure>
                                <img src="./assets/images/icon-images/Audiobooks.png" alt="audiobooks icon">
                                <figcaption>Audiobooks</figcaption>
                            </figure>
                        </a>
                    </li>


                    <li>
                        <a href="#">
                            <figure>
                                <img src="./assets/images/icon-images/Artists.png" alt="artists icon">
                                <figcaption>Artists</figcaption>
                            </figure>
                        </a>

                    </li>
                </ul>

            </nav>
        </aside>
        <!-- pavle's sections -->
        <div class="content-wrapper">
            <header class="top-header">
                <nav class="main-nav">
                    <ul>
                        <li class="active">
                            <a href="#">
                                <figure>
                                    <img src="assets/images/icon-images/home_icon.svg" alt="home">
                                    <figcaption>Home</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <figure>
                                    <img src="assets/images/icon-images/discover_icon.svg" alt="discover">
                                    <figcaption>Discover</figcaption>
                                </figure>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <figure>
                                    <img src="assets/images/icon-images/search_icon.svg" alt="search">
                                    <figcaption>Search</figcaption>
                                </figure>
                            </a>
                        </li>
                    </ul>
                </nav>
                <div class="actions">
                    <div class="action-icons">
                        <a href="#"><img src="assets/images/icon-images/references.svg" alt="references"></a>
                        <a href="#"><img src="assets/images/icon-images/block.svg" alt="block"></a>
                        <a href="#"><img src="assets/images/icon-images/friends.svg" alt="friends"></a>
                        <a href="#"><img src="assets/images/icon-images/setting.svg" alt="settings"></a>
                    </div>
                    <div class="logo">
                        <img src="assets/images/icon-images/logo.svg" alt="Logo" class="user-logo">
                    </div>
                </div>
            </header>
            <!-- gio's sections -->
            <main class="main-content">

            </main>
            <footer>
                <!-- Start Desktop Footer Player -->
                <div class="player-wrapper">
                    <!-- Left: Playback Controls -->
                    <div class="player-left">
                        <button class="btn-play-pause">
                            <img src="assets/images/icon-images/pause_icon.svg" alt="pause">
                        </button>
                        <button class="btn-prev">
                            <img src="assets/images/icon-images/prev_icon.svg" alt="previous">
                        </button>
                        <button class="btn-next">
                            <img src="assets/images/icon-images/next_icon.svg" alt="next">
                        </button>
                        <button class="btn-shuffle">
                            <img src="assets/images/icon-images/shuffle_icon.svg" alt="shuffle">
                        </button>
                        <button class="btn-loop">
                            <img src="assets/images/icon-images/loop_icon.svg" alt="loop">
                        </button>
                    </div>

                    <!-- Center: Progress Bar + Volume -->
                    <div class="player-center">
                        <span class="time-current">2:23</span>
                        <input class="progress-bar" type="range" min="0" max="100" value="52">
                        <span class="time-total">4:45</span>
                        <button class="btn-volume">
                            <img src="assets/images/icon-images/volume_icon.svg" alt="volume">
                        </button>
                        <figure class="player-album-cover">
                            <img src="assets/images/player_cover.png" alt="Get Lucky album art">
                        </figure>
                        <div class="player-song-info">
                            <span class="song-title">Get Lucky</span>
                            <span class="song-artist">Deft Punk</span>
                            <span class="song-album">Random Access Memories</span>
                        </div>
                    </div>

                    <!-- Right: Song Info + Actions + Profile -->
                    <div class="player-right">
                        <div class="player-actions">
                            <button class="btn-fav">
                                <img src="assets/images/icon-images/fav_icon.svg" alt="favorite">
                            </button>
                            <button class="btn-add">
                                <img src="assets/images/icon-images/add_icon.svg" alt="add">
                            </button>
                            <button class="btn-lyrics">
                                <img src="assets/images/icon-images/lyrics_icon.svg" alt="lyrics">
                            </button>
                            <button class="btn-device">
                                <img src="assets/images/icon-images/device_icon.svg" alt="device">
                            </button>
                            <button class="btn-more">
                                <img src="assets/images/icon-images/more_icon.svg" alt="more">
                            </button>
                            <button class="btn-avatar">
                                <img src="assets/images/icon-images/avatar_icon.svg" alt="avatar">
                            </button>
                            <button class="btn-menu">
                                <img src="assets/images/icon-images/menu_icon.svg" alt="menu">
                            </button>
                        </div>
                    </div>
                    <div class="container">
                        <nav>
                            <ul>
                                <li>
                                    <a href="#">
                                        <figure>
                                            <img src="assets/images/home_icon.svg" alt="home">
                                            <figcaption>Home</figcaption>
                                        </figure>
                                    </a>
                                </li>
                                <li>
                                    <a href="#">
                                        <figure>
                                            <img src="assets/images/discover_icon.svg" alt="discover">
                                            <figcaption>Discover</figcaption>
                                        </figure>
                                    </a>
                                </li>
                                <li>
                                    <a href="#">
                                        <figure>
                                            <img src="assets/images/search_icon.svg" alt="search">
                                            <figcaption>Search</figcaption>
                                        </figure>
                                    </a>
                                </li>
                                <li>
                                    <a href="#">
                                        <figure>
                                            <img src="assets/images/library_icon.svg" alt="library">
                                            <figcaption>Library</figcaption>
                                        </figure>
                                    </a>
                                </li>
                                <li>
                                    <a href="#">
                                        <figure>
                                            <img src="assets/images/me_icon.svg" alt="me">
                                            <figcaption>Me</figcaption>
                                        </figure>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                    <!-- End Desktop Footer Player -->

                    <!-- Start Mobile Footer Menu -->
                    <nav>
                        <ul>
                            <li>
                                <a href="#">
                                    <figure>
                                        <img src="assets/images/icon-images/home_icon.svg" alt="home">
                                        <figcaption>Home</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <figure>
                                        <img src="assets/images/icon-images/discover_icon.svg" alt="discover">
                                        <figcaption>Discover</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <figure>
                                        <img src="assets/images/icon-images/search_icon.svg" alt="search">
                                        <figcaption>Search</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <figure>
                                        <img src="assets/images/icon-images/library_icon.svg" alt="library">
                                        <figcaption>Library</figcaption>
                                    </figure>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <figure>
                                        <img src="assets/images/icon-images/me_icon.svg" alt="me">
                                        <figcaption>Me</figcaption>
                                    </figure>
                                </a>
                            </li>
                        </ul>
                    </nav>
                    <!-- End Mobile Footer Menu -->
            </footer>
        </div>
    </div>
</body>

</html>
